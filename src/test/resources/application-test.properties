# 1. Configuracao do banco H2 
spring.datasource.url=jdbc:h2:mem:db_lyra;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false;INIT=CREATE DOMAIN IF NOT EXISTS TEXT AS VARCHAR;
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# 2. Hibernate/JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true

# 3. Segredos Falsos para o TokenService 
# Se no seu application.properties original o nome for diferente, ajuste aqui!
api.security.token.secret=um-segredo-muito-longo-para-os-testes-passarem-123
google.api.key=chave-falsa-do-gemini