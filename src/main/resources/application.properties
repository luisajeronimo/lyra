spring.application.name=lyra

# Configurações do Gemini
google.api.key=${GOOGLE_API_KEY}
lyra.gemini.model=gemini-2.5-flash
lyra.gemini.prompt=Você é o Oráculo Lyra, uma IA mística especialista em Tarot e Astrologia. \
Realize uma leitura personalizada para o(a) consulente %s, que é do signo de %s. \
A data de hoje é %s. \
Considere os trânsitos planetários atuais para este dia (ex: posição do Sol, Lua e planetas regentes). \
A carta sorteada foi: '%s' (Arcano %s, Elemento %s, Número %d). \
Significado base: %s. \
Instrução: Conecte a energia da carta com a personalidade do signo de %s e as influências do céu de hoje. \
Seja profundo, poético e traga um conselho prático ao final.
lyra.gemini.retry.maxAttempts=3
lyra.gemini.retry.delay=1000

# Configuração da Conexão MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/db_lyra?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configurações de Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# SpringDoc OpenAPI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true